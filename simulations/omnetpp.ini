[General]
network = emtp.simulations.EMTPNetwork
sim-time-limit = 100s

# Result recording
**.vector-recording = true
**.scalar-recording = true

# ================================================================
# Configuration: Baseline
# Normal operation with no constraints
# ================================================================
[Config Baseline]
description = "Baseline scenario - unlimited capacity, no priority discrimination"

# Network configuration
*.numClients = 5

# Server configuration
*.server.serverName = "mail.example.com"
*.server.processingDelay = 0.1s
*.server.deliveryRate = 0.5s
*.server.maxQueueSize = 100
*.server.constrainedMode = false
*.server.enableFiltering = true
*.server.requireSubject = true
*.server.requireEncryption = false
*.server.encryptionSeed = 12345

# Client configurations
*.client[*].clientName = "client"
*.client[*].mailFrom = "sender@example.com"
*.client[*].mailTo = "receiver@example.com"
*.client[*].subject = "Test Email"
*.client[*].messageBody = "This is a test message."
*.client[*].useEncryption = true
*.client[*].startTime = uniform(1s, 3s)

# Mix of priorities
*.client[0..2].priority = "HIGH"
*.client[3..4].priority = "LOW"

# ================================================================
# Configuration: Constrained
# Bandwidth/queue limited scenario to test priority handling
# ================================================================
[Config Constrained]
extends = Baseline
description = "Constrained scenario - reduced processing/delivery rate, priority matters"

*.numClients = 10

# Server with constraints
*.server.deliveryRate = 2s  # Slower delivery rate
*.server.maxQueueSize = 20  # Smaller queue
*.server.constrainedMode = true  # Enable priority-based processing

# More clients with varied priorities
*.client[*].startTime = uniform(1s, 5s)
*.client[0..4].priority = "HIGH"
*.client[5..9].priority = "LOW"

# ================================================================
# Configuration: NoEncryption
# Test without encryption to measure overhead
# ================================================================
[Config NoEncryption]
extends = Baseline
description = "No encryption scenario - measure encryption overhead"

*.numClients = 5
*.client[*].useEncryption = false
*.server.requireEncryption = false

# ================================================================
# Configuration: StrictFiltering
# Test with strict filtering rules
# ================================================================
[Config StrictFiltering]
extends = Baseline
description = "Strict filtering - test rejection scenarios"

*.numClients = 8
*.server.enableFiltering = true
*.server.requireSubject = true
*.server.requireEncryption = true

# Some clients without proper configuration
*.client[0..4].subject = "Valid Subject"
*.client[5..7].subject = ""  # Missing subject - should be rejected

# ================================================================
# Configuration: HighLoad
# High load scenario with many clients
# ================================================================
[Config HighLoad]
extends = Constrained
description = "High load scenario - many clients, test queue behavior"

*.numClients = 20
*.server.maxQueueSize = 50
*.server.deliveryRate = 1s

*.client[*].startTime = uniform(0.5s, 10s)
*.client[0..9].priority = "HIGH"
*.client[10..19].priority = "LOW"

# ================================================================
# Configuration: SingleClient
# Simple test with one client for debugging
# ================================================================
[Config SingleClient]
description = "Single client test for debugging"

*.numClients = 1
*.server.serverName = "mail.example.com"
*.server.processingDelay = 0.1s
*.server.deliveryRate = 0.5s
*.server.maxQueueSize = 100
*.server.constrainedMode = false
*.server.enableFiltering = true
*.server.requireSubject = true
*.server.requireEncryption = false
*.server.encryptionSeed = 12345

*.client[0].clientName = "testclient"
*.client[0].mailFrom = "sender@example.com"
*.client[0].mailTo = "receiver@example.com"
*.client[0].subject = "Test Email"
*.client[0].messageBody = "This is a test message."
*.client[0].priority = "HIGH"
*.client[0].useEncryption = true
*.client[0].startTime = 1s
